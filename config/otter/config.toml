[general]
default_module = "a"
empty_module = "a"
exec_cmd = "sh -c"
vi_mode = true
esc_to_abort = true
cheatsheet_entry = "?"
cheatsheet_viewer = "less -R; clear"
clear_screen_after_execution = false
loop_mode = false
external_editor = "vi"
delay_startup = 0
callback = ""

[interface]
header = """
 \u001B[34;1m>  \u001B[0m$USER@$(cat /proc/sys/kernel/hostname)\u001B[0m$(printf '\u001B[999C\u001B[14D')\u001B[31m\u001B[0m $(awk '/cpu / {printf "%d%%", int(100 - ($8 * 100 / ($2+$3+$4+$5+$6+$7+$8)))}' /proc/stat) \u001B[33m󰍛\u001B[0m $(awk '/MemTotal/ {t=$2} /MemAvailable/ {a=$2; printf "%.1fG", (t-a)/1024/1024}' /proc/meminfo)
    """
header_cmd = ""
header_cmd_trimmed_lines = 0
place_holder = "type & search"
suggestion_mode = "list"
separator = "    \u001B[0;90mmodules ───────────────────────────────────────────────"
footer = ""
suggestion_lines = 20
list_prefix = "    "
selection_prefix = "  \u001B[31;1m▌ "
prefix_padding = 3
default_module_message = "    \u001B[33msearch\u001B[0m the internet"
empty_module_message = ""
customized_list_order = false
indicator_with_arg_module = ""
indicator_no_arg_module = ""
prefix_color = "\u001B[33m"
description_color = "\u001B[39m"
place_holder_color = "\u001B[30m"
hint_color = "\u001B[30m"
move_interface_right = 0
move_interface_down = 0

[[modules]]
description = "browse apps"
prefix = "a"
cmd = "fsel -vv -r -d -ss \"{}\""
with_argument = true

[[modules]]
description = "launch app directly"
prefix = "app"
cmd = "fsel -r -d -p \"{}\""
with_argument = true

[[modules]]
description = "google search"
prefix = "g"
cmd = "xdg-open https://www.google.com/search?q='{}'"
with_argument = true
url_encode = true
unbind_proc = true

[[modules]]
description = "power menu (fzf)"
prefix = "po"
cmd = """
function power {
if [[ -n $1 ]]; then
case $1 in
"logout") session=`loginctl session-status | head -n 1 | awk '{print $1}'`; loginctl terminate-session $session ;;
"suspend") systemctl suspend ;;
"hibernate") systemctl hibernate ;;
"reboot") systemctl reboot ;;
"shutdown") systemctl poweroff ;;
esac fi }
power $(echo -e 'reboot\nshutdown\nlogout\nsuspend\nhibernate' | fzf --padding 1,2 --info-command 'printf " power menu ($FZF_POS/$FZF_TOTAL_COUNT)"' --cycle --gutter " " --pointer " ▌" --color "bg+:-1,pointer:1,info:8,separator:8,scrollbar:0" --prompt '>  ' | tail -1)
"""

[[modules]]
description = "search youtube"
prefix = "yt"
cmd = "xdg-open 'https://www.youtube.com/results?search_query={}'"
with_argument = true
url_encode = true
unbind_proc = true

[[modules]]
description = "search archwiki"
prefix = "aw"
cmd = "xdg-open https://wiki.archlinux.org/index.php?search='{}'"
with_argument = true
url_encode = true
unbind_proc = true

[[modules]]
description = "search the AUR"
prefix = "aur"
cmd = "xdg-open https://aur.archlinux.org/packages?K='{}'"
with_argument = true
url_encode = true
unbind_proc = true

[[modules]]
description = "set volume (0-100)"
prefix = "vol"
cmd = "wpctl set-volume @DEFAULT_AUDIO_SINK@ {}%"
with_argument = true

[[modules]]
description = "calculator (qalc)"
prefix = "cal"
cmd = "qalc -t '{}'; read -p 'Press enter to exit...'"
with_argument = true
