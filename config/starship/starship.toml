# ╭──────────────────────────────────────────────────────╮
# │  Starship — Minimal · Rosé Pine  ·  Fish Shell       │
# │  git · languages · kubernetes · docker               │
# ╰──────────────────────────────────────────────────────╯
#
# Install : cp starship.toml ~/.config/starship.toml
# Fish    : add `starship init fish | source` to ~/.config/fish/config.fish
# Fonts   : requires a Nerd Font (e.g. JetBrainsMono Nerd Font)

"$schema" = "https://starship.rs/config-schema.json"
scan_timeout     = 100
command_timeout  = 500
add_newline      = false
follow_symlinks  = false
palette          = "rose_pine"

# ── Layout ─────────────────────────────────────────────────────────────────────
# Left  : dir  git-remote  git-branch  git-worktree  git-status  newline  char
# Right : python  node  docker  kubernetes
format = """
$directory\
${custom.giturl}\
$git_branch\
${custom.git_worktree}\
$git_status\
$line_break\
$character\
"""

right_format = """
$python\
$nodejs\
$docker_context\
$kubernetes\
"""

# ── Directory ──────────────────────────────────────────────────────────────────
[directory]
style                     = "bold foam"
format                    = "[ $path ]($style)"
truncation_length         = 4
truncate_to_repo          = false
fish_style_pwd_dir_length = 1

# [directory.substitutions]
# "Documents" = "󰈙 "
# "Downloads" = "󰉍"
# "Music"     = "󱍙"
# "Pictures"  = "󰉏"
# "dev" = "󰲋 "
# "~"         = "󱂵"

# ── Git remote icon ────────────────────────────────────────────────────────────
[custom.giturl]
description    = "Display symbol for remote Git server"
command        = """
GIT_REMOTE=$(command git ls-remote --get-url 2>/dev/null)
if [[ "$GIT_REMOTE" =~ "github" ]]; then
    echo " "
elif [[ "$GIT_REMOTE" =~ "gitlab" ]]; then
    echo " "
elif [[ "$GIT_REMOTE" =~ "bitbucket" ]]; then
    echo " "
elif [[ "$GIT_REMOTE" =~ "git" ]]; then
    echo " "
else
    echo " "
fi
"""
when           = "git rev-parse --is-inside-work-tree 2>/dev/null"
format         = "[$output]($style)"
style          = "fg:muted"
require_repo   = true
ignore_timeout = true

# ── Git branch ─────────────────────────────────────────────────────────────────
[git_branch]
symbol = " "
style  = "bold iris"
format = "[$symbol$branch]($style) "

# ── Git worktree indicator ─────────────────────────────────────────────────────
[custom.git_worktree]
description    = "Show indicator when inside a git worktree"
command        = """
common_dir=$(git rev-parse --path-format=absolute --git-common-dir 2>/dev/null)
git_dir=$(git rev-parse --path-format=absolute --git-dir 2>/dev/null)
if [ "$common_dir" != "$git_dir" ]; then
    echo "⛓ "
fi
"""
when           = "git rev-parse --is-inside-work-tree 2>/dev/null"
format         = "[$output]($style)"
style          = "bold pine"
require_repo   = true
ignore_timeout = true

# ── Git status ─────────────────────────────────────────────────────────────────
[git_status]
style      = ""
format     = "[$staged$modified$untracked$renamed$deleted$conflicted$stashed$ahead_behind]($style)"
staged     = "[+$count ](pine)"
modified   = "[!$count ](gold)"
untracked  = "[?$count ](foam)"
renamed    = "[»$count ](iris)"
deleted    = "[-$count ](love)"
conflicted = "[✖$count ](bold love)"
stashed    = "[≡$count ](subtle)"
ahead      = "[⇡$count ](pine)"
behind     = "[⇣$count ](rose)"
diverged   = "[⇕⇡${ahead_count}⇣${behind_count} ](love)"

# ── Line break / character ─────────────────────────────────────────────────────
[line_break]
disabled = false

[character]
disabled       = false
success_symbol = "[➜](bold pine)"
error_symbol   = "[➜](bold love)"
vimcmd_symbol  = "[](bold rose)"

# ── Python (right prompt) ──────────────────────────────────────────────────────
[python]
symbol       = " "
style        = "bold foam"
format       = "[ $symbol$version ]($style)"
detect_files = [
  ".python-version", "requirements.txt", "pyproject.toml",
  "setup.py", "setup.cfg", "Pipfile", "__pycache__"
]

# ── Node.js (right prompt) ─────────────────────────────────────────────────────
[nodejs]
symbol       = " "
style        = "bold pine"
format       = "[ $symbol$version ]($style)"
detect_files = ["package.json", ".nvmrc", ".node-version"]

# ── Docker (right prompt) ──────────────────────────────────────────────────────
[docker_context]
symbol          = "󰡨 "
style           = "bold rose"
format          = "[ $symbol$context ]($style)"
only_with_files = true
detect_files    = [
  "docker-compose.yml", "docker-compose.yaml",
  "Dockerfile", ".dockerignore"
]

# ── Kubernetes (right prompt) ──────────────────────────────────────────────────
[kubernetes]
disabled = false
symbol   = "󱃾 "
style    = "bold iris"
format   = "[ $symbol$context( [$namespace](italic muted)) ]($style)"

# Uncomment to shorten long cluster names:
# [kubernetes.context_aliases]
# "arn:aws:eks:us-east-1:123456:cluster/prod" = "prod"
# "gke_project_region_dev"                    = "dev"

# ── Disabled clutter ───────────────────────────────────────────────────────────
[package]
disabled = true

[time]
disabled = true

[os]
disabled = true

[username]
disabled = true

# ── Palette — Rosé Pine ────────────────────────────────────────────────────────
# Base overridden to #161616 per preference; all others from official palette
[palettes.rose_pine]
base           = "#161616"   # custom (official is #191724)
surface        = "#1f1d2e"
overlay        = "#26233a"
muted          = "#6e6a86"
subtle         = "#908caa"
text           = "#e0def4"
love           = "#eb6f92"
gold           = "#f6c177"
rose           = "#ebbcba"
pine           = "#31748f"
foam           = "#9ccfd8"
iris           = "#c4a7e7"
highlight_low  = "#21202e"
highlight_med  = "#403d52"
highlight_high = "#524f67"
